    <!-- Tailwind is now built locally (PostCSS) — see tailwind.config.js.
         Theme tokens live in /index.css; only the no-FOUC class-toggle runs inline. -->
    <script>
      // Initialize Theme based on system preference or saved selection
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
    </script>
